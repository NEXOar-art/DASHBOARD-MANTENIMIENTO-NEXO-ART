<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXO-ART Analytics Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .tab-active { background-color: #1e40af; color: white; box-shadow: 0 10px 15px -3px rgb(30 64 175); }
    .correlation-bar { height: 8px; border-radius: 9999px; }
    .ml-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .kpi-gauge { position: relative; width: 80px; height: 80px; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200">
  <div class="flex h-screen overflow-hidden">
    <!-- SIDEBAR (intacto) -->
    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col">
      <div class="p-6 border-b border-slate-800">
        <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">NEXO-ART</h1>
        <p class="text-sm font-semibold tracking-widest text-slate-400 uppercase mt-1">Analytics Pro v3.1 • IA Predictiva</p>
      </div>
      <nav class="flex-1 p-4 space-y-2 overflow-y-auto" id="sidebar-nav"></nav>
      <div class="p-4 border-t border-slate-800 text-slate-500 text-sm flex items-center">
        <i class="fas fa-cog mr-2"></i> Configuración
      </div>
    </aside>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col">
      <!-- HEADER (con notificaciones) -->
      <header class="h-16 bg-slate-900 border-b border-slate-800 px-6 flex items-center justify-between">
        <div class="flex items-center gap-6">
          <button onclick="exportData()" class="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-sm">
            <i class="fas fa-download"></i> Exportar CSV
          </button>
          <button onclick="refreshDashboard()" class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-xl text-sm text-white">
            <i class="fas fa-sync"></i> Actualizar
          </button>
          <button onclick="showIAInsights()" class="flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-xl text-sm text-white">
            🤖 IA Insights
          </button>
        </div>

        <!-- NOTIFICACIONES -->
        <div class="relative flex items-center gap-6">
          <button onclick="toggleNotifications()" class="relative flex items-center text-slate-300 hover:text-white">
            <i class="fas fa-bell text-xl"></i>
            <span id="notification-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 rounded-full min-w-[18px] h-[18px] flex items-center justify-center">0</span>
          </button>
          <div class="text-right">
            <p class="text-sm font-medium">Taller Central • Campana, Buenos Aires</p>
            <p class="text-xs text-emerald-400 flex items-center justify-end"><span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse mr-1"></span> Sistema Online</p>
          </div>
        </div>

        <!-- Panel de notificaciones -->
        <div id="notification-panel" class="hidden absolute top-16 right-6 bg-slate-900 border border-slate-700 rounded-3xl shadow-2xl w-96 max-h-[420px] overflow-hidden z-50">
          <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800">
            <h4 class="font-semibold">Notificaciones</h4>
            <button onclick="markAllAsRead()" class="text-xs text-emerald-400 hover:text-emerald-300">Marcar todas como leídas</button>
          </div>
          <div id="notifications-list" class="max-h-[340px] overflow-y-auto p-2"></div>
        </div>
      </header>

      <!-- SECCIÓN DE CARGA DE DATOS (intacto) -->
      <div class="bg-slate-900 border-b border-slate-800 px-6 py-6">
        <!-- ... (campos UNIDAD, ID, MOTOR/TIPO, MTBF, MTTR, etc. permanecen exactamente iguales) ... -->
      </div>

      <!-- CONTENIDO DINÁMICO -->
      <div class="flex-1 overflow-auto p-6" id="content-area"></div>
    </div>
  </div>

  <script>
    // ==================== DATOS GLOBALES Y ML (intacto) ====================
    let dashboardData = [];
    let notifications = [];

    async function loadDataFromGoogleSheet() { /* mismo código anterior */ }

    function runPredictiveML() { /* mismo código anterior */ }

    // ==================== GESTIÓN DE NOTIFICACIONES ====================
    function addNotification(title, message, type = "info") {
      const notif = {
        id: Date.now(),
        title: title,
        message: message,
        type: type, // info, warning, critical
        time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
        read: false
      };
      notifications.unshift(notif);
      updateNotificationBadge();
      renderNotifications();
    }

    function updateNotificationBadge() {
      const unread = notifications.filter(n => !n.read).length;
      document.getElementById("notification-badge").textContent = unread;
      document.getElementById("notification-badge").classList.toggle("hidden", unread === 0);
    }

    function toggleNotifications() {
      const panel = document.getElementById("notification-panel");
      panel.classList.toggle("hidden");
      if (!panel.classList.contains("hidden")) renderNotifications();
    }

    function renderNotifications() {
      const container = document.getElementById("notifications-list");
      if (notifications.length === 0) {
        container.innerHTML = `<p class="text-slate-400 text-center py-8">No hay notificaciones</p>`;
        return;
      }
      container.innerHTML = notifications.map(n => `
        <div onclick="markAsRead(${n.id})" class="flex gap-3 px-4 py-3 hover:bg-slate-800 rounded-2xl cursor-pointer ${n.read ? 'opacity-60' : ''}">
          <div class="${n.type === 'critical' ? 'text-red-400' : n.type === 'warning' ? 'text-amber-400' : 'text-emerald-400'}">
            <i class="fas fa-${n.type === 'critical' ? 'exclamation-triangle' : n.type === 'warning' ? 'exclamation-circle' : 'info-circle'}"></i>
          </div>
          <div class="flex-1">
            <div class="font-medium text-sm">${n.title}</div>
            <p class="text-xs text-slate-400">${n.message}</p>
            <p class="text-[10px] text-slate-500 mt-1">${n.time}</p>
          </div>
        </div>
      `).join('');
    }

    function markAsRead(id) {
      const notif = notifications.find(n => n.id === id);
      if (notif) notif.read = true;
      updateNotificationBadge();
      renderNotifications();
    }

    function markAllAsRead() {
      notifications.forEach(n => n.read = true);
      updateNotificationBadge();
      renderNotifications();
    }

    // ==================== TAILWIND + RENDER (intacto) ====================
    function initTailwind() { tailwind.config = { content: [], theme: { extend: {} } }; }
    const tabs = [ /* mismo array */ ];
    function renderSidebar() { /* mismo */ }
    let activeTab = "overview";
    function setActiveTab(id) { /* mismo */ }
    function renderContent() { /* mismo con KPIs */ }

    function trainMLModel() {
      addNotification("Modelo IA Re-entrenado", "Datos actualizados desde Google Sheets. Precisión: " + runPredictiveML().metrics.accuracy, "info");
      setActiveTab("predictive");
    }

    // ==================== ENVÍO AUTOMÁTICO (intacto) ====================
    function submitToGoogleSheets() {
      /* mismo código de envío */
      const row = { /* ... campos */ };
      const csvRow = Object.values(row).join("\t");
      navigator.clipboard.writeText(csvRow).then(() => {
        window.open("https://docs.google.com/spreadsheets/d/1lqQCZ3PalQtvYPkaxTUPth1wTW20tu3zgPgT-z64a3U/edit?usp=sharing", "_blank");
        alert("✅ Datos enviados de forma automática y colocados en la tabla correspondiente.");
        
        // Notificación automática al enviar
        addNotification("Nuevo registro cargado", `Unidad ${document.getElementById("input-unidad").value} agregada correctamente`, "info");
      });
      document.querySelectorAll('input, select').forEach(el => { if (el.tagName === "SELECT") el.selectedIndex = 0; else el.value = ""; });
      loadDataFromGoogleSheet().then(() => renderContent());
    }

    // ==================== INICIALIZACIÓN ====================
    window.onload = () => {
      initTailwind();
      renderSidebar();
      loadDataFromGoogleSheet().then(() => {
        renderContent();
        // Ejemplo inicial de notificación
        setTimeout(() => {
          addNotification("Sistema Online", "Conectado a Google Sheets y modelo IA activo", "info");
        }, 1200);
      });
    };
  </script>
</body>
</html>
